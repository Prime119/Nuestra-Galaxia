<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nuestra Galaxia</title>
  <meta name="theme-color" content="#03030a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nuestra Galaxia" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Pantalla de carga -->
  <div id="loader">
    <div class="loader-core"></div>
    <p>Encendiendo las estrellas...</p>
  </div>

  <!-- Lienzo de la galaxia -->
  <canvas id="galaxy-canvas"></canvas>

  <!-- Palabras que aparecen sobre el corazón del centro -->
  <div id="heart-words">
    <span class="hw-1">Te amo</span>
    <span class="hw-2">Preciosa Hermosa</span>
  </div>

  <!-- Pista de exploración -->
  <div id="hint">
    <span>Arrastra para mirar &nbsp;·&nbsp; Pellizca o rueda para acercarte &nbsp;·&nbsp; Toca un astro</span>
  </div>

  <!-- Destello de luz a pantalla completa (sin uso actual) -->
  <div id="flash"></div>

  <!-- Marco de contenido flotante que sigue al astro -->
  <div id="astro-card" class="astro-card">
    <button id="astro-card-close" class="astro-card-close" aria-label="Cerrar">&times;</button>
    <h3 id="astro-card-title"></h3>
    <div id="astro-card-body" class="astro-card-body"></div>
  </div>

  <!-- Ventana de contenido -->
  <div id="modal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <button id="modal-close" class="modal-close" aria-label="Cerrar">&times;</button>
      <h2 id="modal-title"></h2>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
